<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Calendario | RegaloFamiliar</title>

    <link rel="shortcut icon" href="assets/logo.png" type="image/png" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto:wght@700;900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"
    />

    <script defer src="js/auth.js"></script>
    <script defer src="js/data.js"></script>
    <script defer src="js/calendario.js"></script>

    <link rel="stylesheet" href="css/index.css" />
  </head>

  <body>
    <main>
      <section class="app">
        <header class="header">
          <div class="container header__container">
            <a class="header__brand" href="dashboard.html">RegaloFamiliar</a>

            <nav class="header__nav" aria-label="Navegación principal">
              <a class="header__link" href="dashboard.html">Inicio</a>
              <a class="header__link" href="participantes.html">Participantes</a>
              <a class="header__link header__link--active" href="calendario.html">Calendario</a>
              <a class="header__link" href="informacion.html">Información</a>
            </nav>
          </div>
        </header>

        <section class="calendar">
          <div class="container calendar__container">
            <div class="calendar__hero">
              <img class="calendar__logo" src="assets/logo.png" alt="Logo" />

              <div>
                <h1 class="calendar__title">Calendario</h1>
                <p class="calendar__subtitle">Ciclo Abril 2026 - Marzo 2027</p>
              </div>
            </div>

            <!-- MESES -->
            <section class="calendar-grid" id="calendarGrid"></section>
            <!-- /MESES -->

            /* ------- BOTONES INFERIORES ------ */
            <section class="calendar-actions">
              <a class="calendar-action" href="dashboard.html">
                <span>Ver balance</span>
                <i class="ri-arrow-right-line"></i>
              </a>

              <a class="calendar-action" href="participantes.html">
                <span>Ver participantes</span>
                <i class="ri-arrow-right-line"></i>
              </a>

              <a class="calendar-action" href="participantes.html">
                <span>Más info</span>
                <i class="ri-arrow-right-line"></i>
              </a>
            </section>
          </div>
        </section>
          /* ------- BOTONES INFERIORES ------ */

        <nav class="mobile-nav" aria-label="Navegación móvil">
          <a class="mobile-nav__link" href="dashboard.html">
            <i class="ri-home-5-line"></i>
          </a>

          <a class="mobile-nav__link" href="participantes.html">
            <i class="ri-group-line"></i>
          </a>

          <a
            class="mobile-nav__link mobile-nav__link--active"
            href="calendario.html"
          >
            <i class="ri-gift-line"></i>
          </a>

          <a class="mobile-nav__link" href="informacion.html"><i class="ri-information-line"></i></a>
          </a>
        </nav>
      </section>
    </main>
  </body>
</html>
