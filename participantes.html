<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Participantes | RegaloFamiliar</title>
    <meta
      name="description"
      content="Listado de participantes del sistema RegaloFamiliar."/>

    <link rel="icon" type="image/png" href="assets/logo.png"/>

    <link
      href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
      rel="stylesheet"/>

    <link rel="stylesheet" href="css/index.css"/>

    <script defer src="js/auth.js"></script>
    <script defer src="js/data.js"></script>
    <script defer src="js/participantes.js"></script>
  </head>

  <body>
    <main class="participants-page-main">
      <header class="header">
        <div class="container header__container">
          <a class="header__brand" href="dashboard.html" aria-label="ir al dashboard">
              <img class="header__logo" src="assets/logowhite.svg" alt="RegaloFamiliar">
            </a>

          <nav class="header__nav" aria-label="Navegación principal">
            <a class="header__link" href="dashboard.html">Inicio</a>

            <a
              class="header__link header__link--active"
              href="participantes.html">Participantes
            </a>

            <a class="header__link" href="calendario.html">Calendario</a>

            <!-- <a class="header__link" href="informacion.html">Información</a> -->
          </nav>
        </div>
      </header>

      <section class="participants">
        <div class="container participants__container">
          <div class="participants__hero">
            <img class="participants__logo" src="assets/logo.png" alt="Logo" />

            <div>
                <h1 class="calendar__title">Participantes</h1>
                <p class="calendar__subtitle">Estado individual de cada participante</p>
              </div>
          </div>

          <!-- CARDS DE PARTICIPANTES -->
          <div class="participants-search">
            <i class="ri-search-line"></i>

            <input type="text" id="participantsSearch" placeholder="Buscar participante..."/>
          </div>

          <section class="participants-grid" id="participantsGrid"></section>
          <!-- /CARDS DE PARTICIPANTES -->

          <!-- BOTONES DE ACCIÓN -->
          <section class="page-actions">
            <a class="page-action" href="dashboard.html">
              <span>Ver balance</span>
              <i class="ri-arrow-right-line"></i>
            </a>

            <a class="page-action" href="calendario.html">
              <span>Ver calendario</span>
              <i class="ri-arrow-right-line"></i>
            </a>
          </section>

          <!-- /BOTONES DE ACCIÓN -->
        </div>
      </section>

      <nav class="mobile-nav" aria-label="Navegación móvil">
        <a class="mobile-nav__link" href="dashboard.html">
          <i class="ri-home-5-line"></i>
        </a>

        <a
          class="mobile-nav__link mobile-nav__link--active"
          href="participantes.html"
        >
          <i class="ri-group-line"></i>
        </a>

        <a class="mobile-nav__link" href="calendario.html">
          <i class="ri-gift-line"></i>
        </a>

        <!-- <a class="mobile-nav__link" href="informacion.html">
          <i class="ri-information-line"></i>
        </a> -->
      </nav>

      <!-- POP UP -->
      <section class="payment-modal is-hidden" id="paymentModal">
        <div class="payment-modal__overlay"></div>

        <article class="payment-modal__content">
          <header class="payment-modal__header">
            <div>
              <h2 class="payment-modal__name">Julián</h2>

              <p class="payment-modal__date">
                <i class="ri-cake-2-line"></i>1 abril / 2027</p>
            </div>

            <button
              class="payment-modal__close" type="button" id="closePaymentModal">
              <i class="ri-close-line"></i>
            </button>
          </header>

          <section class="payment-modal__summary">
            <article>
              <span>Meta</span>
              <strong class="pill pill--primary" id="modalGoal"> $0 </strong>
            </article>

            <article>
              <span>Total aportado</span>
              <strong class="pill pill--success" id="modalTotalPaid">$0</strong>
            </article>

            <article>
              <span>Saldo pendiente</span>
              <strong class="pill pill--danger" id="modalPending">$0</strong>
            </article>

            <article>
              <span>1%</span>

              <strong class="pill" id="modalInitialStatus">Estado</strong>
            </article>
          </section>

          <section class="payment-table">
            <div class="payment-table__head">
              <span>Mes</span>
              <span>Cuota</span>
              <span>Monto pagado</span>
              <span>Estado</span>
            </div>

            <div id="paymentTableRows"></div>
          </section>
        </article>
      </section>
    </main>
  </body>
</html>
