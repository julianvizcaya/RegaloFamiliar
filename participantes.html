<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Participantes | RegaloFamiliar</title>
    <meta
      name="description"
      content="Listado de participantes del sistema RegaloFamiliar."
    />

    <link rel="icon" type="image/png" href="assets/icono_logo.png" />

    <link
      href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/index.css" />
    <script defer src="js/auth.js"></script>
    <script defer src="js/participantes.js"></script>
  </head>

  <body>
    <main class="participants-page-main">
      <header class="header">
        <div class="container header__container">
          <a class="header__brand" href="dashboard.html">RegaloFamiliar</a>

          <nav class="header__nav" aria-label="Navegación principal">
            <a class="header__link" href="dashboard.html"> Inicio </a>
            <a
              class="header__link header__link--active"
              href="participantes.html"
            >
              Participantes
            </a>
            <a class="header__link" href="#">Calendario</a>
          </nav>
        </div>
      </header>

      <section class="participants">
        <div class="container participants__container">
          <div class="participants__hero">
            <img
              class="participants__logo"
              src="assets/icono_logo.png"
              alt="Logo RegaloFamiliar"
            />

            <h1 class="participants__title">Participantes</h1>
          </div>

          <!-- CARDS DE PARTICIPANTES -->
          <div class="participants-search">
            <i class="ri-search-line"></i>

            <input
              type="text"
              id="participantsSearch"
              placeholder="Buscar participante..."
            />
          </div>

          <section class="participants-grid" id="participantsGrid">

          </section>
          <!-- /CARDS DE PARTICIPANTES -->

          <!-- BOTONES DE ACCIÓN -->

          <section class="page-actions">

            <a class="page-action" href="dashboard.html">
              <span>Ver balance</span>
              <i class="ri-arrow-right-line"></i>
            </a>

            <a class="page-action" href="#">
              <span>Ver calendario</span>
              <i class="ri-arrow-right-line"></i>
            </a>
          </section>

           <!-- /BOTONES DE ACCIÓN -->
            
        </div>
      </section>

      <nav class="mobile-nav" aria-label="Navegación móvil">
        <a class="mobile-nav__link" href="dashboard.html">
          <i class="ri-home-5-line"></i>
        </a>

        <a
          class="mobile-nav__link mobile-nav__link--active"
          href="participantes.html"
        >
          <i class="ri-group-line"></i>
        </a>

        <a class="mobile-nav__link" href="#">
          <i class="ri-gift-line"></i>
        </a>

        <a class="mobile-nav__link" href="#">
          <i class="ri-calendar-line"></i>
        </a>
      </nav>
    </main>
  </body>
</html>
