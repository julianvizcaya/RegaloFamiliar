<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Balance Familiar" />

    <meta
      name="keywords"
      content="ahorro, familia, calendario, cumpleaños, balance"
    />
    <meta name="author" content="Julian" />

    <title>Regalo Familiar</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet"/>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"/>
    <link rel="stylesheet" href="css/index.css" />

    <script defer src="js/index.js"></script>
    <script>
        window.va =
          window.va ||
          function () {
            (window.vaq = window.vaq || []).push(arguments);
          };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>

  </head>

  <body>
    <main>
      <!-- PIN ACCESO -->
      <section class="pin">
        <div class="pin__card">
          <div class="pin__logo">
            <img src="assets/logo.png" alt="Logo" />
          </div>
          <p class="pin__title">Ingresa el PIN</p>

          <!-- Dots -->
          <div class="pin__dots">
            <span class="pin__dot" data-pin-dot></span>
            <span class="pin__dot" data-pin-dot></span>
            <span class="pin__dot" data-pin-dot></span>
            <span class="pin__dot" data-pin-dot></span>
          </div>

          <!-- Error -->
          <p class="pin__error">PIN incorrecto</p>

          <!-- Keypad -->
          <div class="pin__keypad">
            <button class="pin__key" data-pin-number="1">1</button>
            <button class="pin__key" data-pin-number="2">2</button>
            <button class="pin__key" data-pin-number="3">3</button>
            <button class="pin__key" data-pin-number="4">4</button>
            <button class="pin__key" data-pin-number="5">5</button>
            <button class="pin__key" data-pin-number="6">6</button>
            <button class="pin__key" data-pin-number="7">7</button>
            <button class="pin__key" data-pin-number="8">8</button>
            <button class="pin__key" data-pin-number="9">9</button>

            <button class="pin__key pin__key--extra">*</button>

            <button class="pin__key" data-pin-number="0">0</button>

            <button
              class="pin__key pin__key--delete" data-pin-delete type="button">
              <i class="ri-delete-back-2-line"></i>
            </button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
